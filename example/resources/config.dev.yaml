server:
  name: demo-service
  addr: ":8080"
  mode: debug

# log:
#   output: console             # "console" (default) | "file" | "both"
#   file:                       # required when output is "file" or "both"
#     path: "logs/app.log"
#     maxSize: 100              # MB per file (default 100)
#     maxAge: 7                 # days to retain (default 7)
#     maxBackups: 5             # old files to keep (default 5)
#     compress: false           # gzip rotated files

# remote:                         # remote config from etcd/consul KV (overrides local)
#   enable: true
#   type: etcd                    # "etcd" or "consul"
#   endpoints:                    # etcd endpoints
#     - "127.0.0.1:2379"
#   # address: "127.0.0.1:8500"  # consul address
#   # token: ""                   # consul ACL token
#   key: "/config/demo-service"   # KV key storing YAML/JSON config
#   format: yaml                  # "yaml" (default) or "json"

database:
  main:
    dsn: "host=127.0.0.1 user=postgres dbname=demo sslmode=disable"
    maxIdle: 10
    maxOpen: 50
    maxLifetime: 3600

redis:
  addr: "127.0.0.1:6379"

grpc:
  enable: false

registry:
  enable: true
  type: etcd                    # "etcd" or "consul"
  endpoints:                    # etcd endpoints
    - "127.0.0.1:2379"
  # address: "127.0.0.1:8500"  # consul address (used when type: consul)
  # token: ""                   # consul ACL token (optional)
